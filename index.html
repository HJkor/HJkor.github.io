<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모바일 신분증</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary-blue: #1a56db; --bg-gray: #f0f3f7; --text-black: #1f2937; }
        body { font-family: Pretendard, -apple-system, sans-serif; background-color: var(--bg-gray); margin: 0; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; color: var(--text-black); }
        
        #screen-pass { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gray); z-index: 900; display: flex; flex-direction: column; align-items: center; padding-top: 10vh; }
        .pass-title { font-size: 1.15rem; font-weight: 700; text-align: center; line-height: 1.6; margin-bottom: 45px; }
        .dots-container { display: flex; gap: 18px; margin-bottom: 35px; }
        .dot { width: 14px; height: 14px; background: rgb(209, 213, 219); border-radius: 50%; transition: background 0.2s; }
        .dot.active { background: rgb(107, 114, 128); }
        .keypad { position: absolute; bottom: 0; width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); background: white; }
        .key { padding: 25px 0; text-align: center; font-size: 1.6rem; font-weight: 500; cursor: pointer; border-bottom: 1px solid rgb(243, 244, 246); border-right: 1px solid rgb(243, 244, 246); }
        .key.blue { background: rgb(59, 130, 246); color: white; font-size: 1.1rem; font-weight: 700; border: none; }

        #screen-main { display: none; width: 100%; height: 100vh; flex-direction: column; position: relative; }
        .header { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; background: white; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-text { font-size: 1rem; font-weight: 700; color: rgb(17, 24, 39); }
        .card-container { margin: 16px; background: white; border-radius: 28px; display: flex; flex-direction: column; box-shadow: rgba(0, 0, 0, 0.08) 0px 10px 25px; overflow: hidden; }
        .content { padding: 30px 24px; display: flex; flex-direction: column; align-items: center; }
        .profile-img-area { width: 140px; height: 185px; background: rgb(243, 244, 246); border-radius: 12px; margin-bottom: 25px; overflow: hidden; border: 1px solid rgb(238, 238, 238); }
        .profile-img-area img { width: 100%; height: 100%; object-fit: cover; }
        .info-section { width: 100%; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .name { font-size: 1.6rem; font-weight: 800; margin: 0; }
        .birth { font-size: 1.1rem; margin: 5px 0; color: rgb(55, 65, 81); }
        .addr { color: rgb(107, 114, 128); font-size: 0.9rem; margin: 0; line-height: 1.4; white-space: pre-wrap; }
        .qr-box { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; background: rgb(255, 255, 255); }
        
        #detail-info { display: none; width: 100%; padding: 15px; background: rgb(249, 250, 251); margin-top: 15px; border-radius: 12px; border-left: 5px solid var(--primary-blue); font-size: 0.85rem; box-sizing: border-box; }
        .timer-area { width: 100%; margin-top: 20px; }
        .timer-bar { height: 5px; background: rgb(243, 244, 246); border-radius: 10px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--primary-blue); width: 100%; transition: width 1s linear; }
        .timer-text { display: flex; justify-content: space-between; font-size: 0.8rem; color: rgb(107, 114, 128); padding: 10px 0; }
        .btn-detail { width: 100%; padding: 18px; background: var(--primary-blue); color: white; border: none; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
        .capture-bar { margin-top: auto; background-color: var(--primary-blue); color: white; height: 35px; display: flex; align-items: center; overflow: hidden; }
        .marquee-content { display: flex; white-space: nowrap; animation: 15s linear 0s infinite normal none running scroll-infinite; }
        .marquee-text { padding-right: 60px; font-size: 0.8rem; }
        @keyframes scroll-infinite { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        .side-menu { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: white; z-index: 2000; transition: 0.4s; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        .side-menu.open { right: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.75rem; color: rgb(107, 114, 128); margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid rgb(221, 221, 221); border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="screen-pass">
        <div class="pass-title">비밀번호를 입력하세요.</div>
        <div class="dots-container" id="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad">
            <div class="key">1</div><div class="key">2</div><div class="key">3</div>
            <div class="key">4</div><div class="key">5</div><div class="key">6</div>
            <div class="key">7</div><div class="key">8</div><div class="key">9</div>
            <div class="key red">C</div>
            <div class="key">0</div>
            <div class="key blue">✔</div>
        </div>
    </div>

    <div id="screen-main">
        <div class="header">
            <div class="header-left">
                <img src="https://i.namu.wiki/i/hDE3JnDsi38teHYizOlMC5ip7L4jOfOFpwe50yKdBd9t9RUSvzTl9smyR55heN2KMgD383A6UzMGdE-GMjDHsQ.svg" width="32" height="32" style="border-radius:6px;">
                <span class="header-text">주민등록증 모바일 확인서비스</span>
            </div>
            <div style="font-size:1.5rem;" id="btn-menu">≡</div>
        </div>
        <div class="card-container">
            <div class="content">
                <div class="profile-img-area" id="profile-area">
                    <img id="profile-img" src="" alt="증명사진" style="display:none; width:100%; height:100%;">
                </div>
                <div class="info-section">
                    <div class="info-text">
                        <p class="name" id="view-name">이형준</p>
                        <p class="birth" id="view-birth">09.08.01</p>
                        <p class="addr" id="view-addr">광주광역시</p>
                    </div>
                    <div class="qr-box" id="qr-box"></div>
                </div>
                <div id="detail-info">
                    <div>발급일자: <span id="view-valid">2026.03.12</span></div>
                    <div>발급기관: <span id="view-issuer">광주광역시장</span></div>
                </div>
                <div class="timer-area">
                    <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
                    <div class="timer-text"><span>남은시간</span><span id="timer-num">30초</span></div>
                </div>
            </div>
            <button class="btn-detail" id="btn-toggle-detail">상세정보 표시</button>
        </div>
        <div class="capture-bar">
            <div class="marquee-content">
                <span class="marquee-text">캡처방지 시스템이 작동중입니다.</span>
                <span class="marquee-text">캡처방지 시스템이 작동중입니다.</span>
            </div>
        </div>
    </div>

    <div class="side-menu" id="side-menu">
        <h2>정보 수정</h2>
        <div class="form-group"><label>비밀번호</label><input type="text" id="set-pass" value="111111"></div>
        <div class="form-group"><label>이름</label><input type="text" id="set-name" value="이형준"></div>
        <div class="form-group"><label>생년월일</label><input type="text" id="set-birth" value="09.08.01"></div>
        <div class="form-group"><label>주소</label><input type="text" id="set-addr" value="광주광역시"></div>
        <div class="form-group"><label>발급일</label><input type="text" id="set-val" value="2026.03.12"></div>
        <div class="form-group"><label>발급기관</label><input type="text" id="set-iss" value="광주광역시장"></div>
        
        <div class="form-group">
            <label>증명사진 업로드</label>
            <input type="file" id="photo-upload" accept="image/*">
        </div>
        
        <button id="btn-save" style="width:100%; padding:15px; background:#111; color:white; border:none; border-radius:10px; font-weight:700;">변경사항 저장</button>
        <button id="btn-close-menu" style="width:100%; margin-top:10px; background:none; border:none; color:#999;">닫기</button>
    </div>

    <script>
        let currentPass = '';
        let timerInterval = null;

        function generateRandomQR() {
            const qrContainer = document.getElementById("qr-box");
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, {
                text: "ID:" + Math.random().toString(36).substr(2,8) + "|T:" + Date.now(),
                width: 100, height: 100, version: 1
            });
        }

        function updateDots() {
            document.querySelectorAll('.dot').forEach((dot, idx) => {
                if(idx < currentPass.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            let timeLeft = 30;
            const timerNum = document.getElementById('timer-num');
            const timerFill = document.getElementById('timer-fill');
            timerNum.innerText = timeLeft + '초';
            timerFill.style.width = '100%';

            timerInterval = setInterval(() => {
                timeLeft--;
                timerNum.innerText = timeLeft + '초';
                timerFill.style.width = (timeLeft / 30 * 100) + '%';
                if(timeLeft <= 0) location.reload();
            }, 1000);
        }

        // ==================== 저장 / 불러오기 ====================
        function saveData() {
            try {
                localStorage.setItem('id_name', document.getElementById('view-name').innerText);
                localStorage.setItem('id_birth', document.getElementById('view-birth').innerText);
                localStorage.setItem('id_addr', document.getElementById('view-addr').innerText);
                localStorage.setItem('id_valid', document.getElementById('view-valid').innerText);
                localStorage.setItem('id_issuer', document.getElementById('view-issuer').innerText);
                
                const img = document.getElementById('profile-img');
                if (img.src && img.style.display !== 'none') {
                    localStorage.setItem('id_photo', img.src);
                }
                return true;
            } catch(e) {
                console.error("저장 실패", e);
                return false;
            }
        }

        function loadData() {
            try {
                if (localStorage.getItem('id_name')) {
                    document.getElementById('view-name').innerText = localStorage.getItem('id_name');
                    document.getElementById('view-birth').innerText = localStorage.getItem('id_birth');
                    document.getElementById('view-addr').innerText = localStorage.getItem('id_addr');
                    document.getElementById('view-valid').innerText = localStorage.getItem('id_valid');
                    document.getElementById('view-issuer').innerText = localStorage.getItem('id_issuer');
                    
                    const photo = localStorage.getItem('id_photo');
                    if (photo) {
                        document.getElementById('profile-img').src = photo;
                        document.getElementById('profile-img').style.display = 'block';
                    }
                }
            } catch(e) {}
        }

        window.onload = function() {
            loadData();

            // 키패드
            document.querySelectorAll('.key').forEach(key => {
                key.addEventListener('click', () => {
                    const val = key.innerText.trim();
                    if(val === 'C') currentPass = '';
                    else if(val === '✔') checkPassword();
                    else if(currentPass.length < 6) currentPass += val;
                    updateDots();
                    if(currentPass.length === 6) setTimeout(checkPassword, 100);
                });
            });

            // 상세정보
            document.getElementById('btn-toggle-detail').addEventListener('click', () => {
                const detail = document.getElementById('detail-info');
                if(detail.style.display === 'block') {
                    detail.style.display = 'none';
                    document.getElementById('btn-toggle-detail').innerText = '상세정보 표시';
                } else {
                    detail.style.display = 'block';
                    document.getElementById('btn-toggle-detail').innerText = '상세정보 숨기기';
                }
            });

            // 메뉴
            document.getElementById('btn-menu').addEventListener('dblclick', () => {
                document.getElementById('side-menu').classList.add('open');
            });

            // 저장 버튼
            document.getElementById('btn-save').addEventListener('click', () => {
                document.getElementById('view-name').innerText = document.getElementById('set-name').value;
                document.getElementById('view-birth').innerText = document.getElementById('set-birth').value;
                document.getElementById('view-addr').innerText = document.getElementById('set-addr').value;
                document.getElementById('view-valid').innerText = document.getElementById('set-val').value;
                document.getElementById('view-issuer').innerText = document.getElementById('set-iss').value;

                const fileInput = document.getElementById('photo-upload');
                if (fileInput.files && fileInput.files[0]) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        document.getElementById('profile-img').src = e.target.result;
                        document.getElementById('profile-img').style.display = 'block';
                        saveData();
                    };
                    reader.readAsDataURL(fileInput.files[0]);
                } else {
                    saveData();
                }

                document.getElementById('side-menu').classList.remove('open');
                alert('✅ 정보가 성공적으로 저장되었습니다!\n(새로고침 후에도 유지됩니다)');
                generateRandomQR();
                startTimer();
            });
        };

        function checkPassword() {
            const correctPass = document.getElementById('set-pass').value || "111111";
            if(currentPass === correctPass) {
                document.getElementById('screen-pass').style.display = 'none';
                document.getElementById('screen-main').style.display = 'flex';
                startTimer();
                generateRandomQR();
            } else {
                alert('비밀번호가 일치하지 않습니다.');
                currentPass = '';
                updateDots();
            }
        }
    </script>
</body>
</html>
