<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>모바일 신분증</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary-blue: #1a56db; --bg-gray: #f0f3f7; }
        body { 
            font-family: Pretendard, -apple-system, sans-serif; 
            background: var(--bg-gray); margin: 0; padding: 0; 
            height: 100vh; overflow: hidden; 
            touch-action: manipulation;
        }
        
        /* ... 기존 스타일 유지 (간소화) ... */
        .key { padding: 22px 0; font-size: 1.6rem; }
        .btn-detail { 
            width: 100%; padding: 18px; background: var(--primary-blue); 
            color: white; border: none; font-weight: 700; font-size: 1.1rem; 
            cursor: pointer; touch-action: manipulation;
        }
        #detail-info { 
            display: none; width: 100%; padding: 15px; background: #f9fafb; 
            margin-top: 15px; border-radius: 12px; border-left: 5px solid var(--primary-blue); 
        }
    </style>
</head>
<body>

    <!-- 비밀번호 화면 -->
    <div id="screen-pass">
        <div class="pass-title">비밀번호를 입력하세요.</div>
        <div class="dots-container" id="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad">
            <div class="key">1</div><div class="key">2</div><div class="key">3</div>
            <div class="key">4</div><div class="key">5</div><div class="key">6</div>
            <div class="key">7</div><div class="key">8</div><div class="key">9</div>
            <div class="key red">C</div>
            <div class="key">0</div>
            <div class="key blue">✔</div>
        </div>
    </div>

    <!-- 메인 화면 -->
    <div id="screen-main">
        <div class="header">
            <div class="header-left">
                <img src="https://i.namu.wiki/i/hDE3JnDsi38teHYizOlMC5ip7L4jOfOFpwe50yKdBd9t9RUSvzTl9smyR55heN2KMgD383A6UzMGdE-GMjDHsQ.svg" width="32" height="32">
                <span class="header-text">주민등록증 모바일 확인서비스</span>
            </div>
            <div style="font-size:1.8rem; padding:10px 15px;" id="btn-menu">≡</div>
        </div>
        
        <div class="card-container">
            <div class="content">
                <div class="profile-img-area">
                    <img id="profile-img" src="" style="display:none; width:100%; height:100%;">
                </div>
                <div class="info-section">
                    <div>
                        <p class="name" id="view-name">이형준</p>
                        <p class="birth" id="view-birth">09.08.01</p>
                        <p class="addr" id="view-addr">광주광역시</p>
                    </div>
                    <div class="qr-box" id="qr-box"></div>
                </div>
                <div id="detail-info">
                    <div>발급일자: <span id="view-valid">2026.03.12</span></div>
                    <div>발급기관: <span id="view-issuer">광주광역시장</span></div>
                </div>
                <div class="timer-area">
                    <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
                    <div class="timer-text"><span>남은시간</span><span id="timer-num">30초</span></div>
                </div>
            </div>
            <button class="btn-detail" id="btn-toggle-detail">상세정보 표시</button>
        </div>
        <div class="capture-bar">...</div>
    </div>

    <!-- 사이드 메뉴 생략 -->

    <script>
        let currentPass = '';

        window.onload = function() {
            // 키패드
            document.querySelectorAll('.key').forEach(key => {
                key.addEventListener('click', () => {
                    const val = key.textContent.trim();
                    if (val === 'C') currentPass = '';
                    else if (val === '✔') checkPassword();
                    else if (currentPass.length < 6) currentPass += val;
                    updateDots();
                    if (currentPass.length === 6) setTimeout(checkPassword, 100);
                });
            });

            // ==================== 상세정보 버튼 (모바일 최적화) ====================
            const detailBtn = document.getElementById('btn-toggle-detail');
            const detailInfo = document.getElementById('detail-info');

            if (detailBtn && detailInfo) {
                const toggleDetail = () => {
                    if (detailInfo.style.display === 'block') {
                        detailInfo.style.display = 'none';
                        detailBtn.textContent = '상세정보 표시';
                    } else {
                        detailInfo.style.display = 'block';
                        detailBtn.textContent = '상세정보 숨기기';
                    }
                };

                // 클릭 + 터치 모두 지원
                detailBtn.addEventListener('click', toggleDetail);
                detailBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    toggleDetail();
                });
            }

            // QR, 타이머 등 초기화
            // ... (나머지 코드는 필요시 추가)
        };

        function updateDots() {
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i < currentPass.length);
            });
        }

        function checkPassword() {
            const correctPass = "111111";
            if (currentPass === correctPass) {
                document.getElementById('screen-pass').style.display = 'none';
                document.getElementById('screen-main').style.display = 'flex';
            } else {
                alert('비밀번호가 일치하지 않습니다.');
                currentPass = '';
                updateDots();
            }
        }
    </script>
</body>
</html>
